- name: Deploy mirror.list file
  ansible.builtin.template:
    src: "mirror.list.j2"
    dest: "/etc/apt/mirror.list"
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Configure Apache to follow symlinks for the mirror
  ansible.builtin.copy:
    dest: /etc/apache2/conf-available/apt-mirror.conf
    content: |
      <Directory /var/www/html>
          Options +FollowSymLinks
          AllowOverride None
          Require all granted
      </Directory>
    mode: '0644'
  become: true
  notify: Restart apache

- name: Enable the apt-mirror apache config
  ansible.builtin.command: a2enconf apt-mirror
  become: true
  notify: Restart apache

- name: Create symbolic link for Ubuntu mirror
  ansible.builtin.file:
    src: "{{ mirror_base_path }}/mirror/{{ mirror_server_name }}/ubuntu"
    dest: /var/www/html/ubuntu
    state: link
    force: yes
  become: true

- name: Create symbolic link for Debian mirror
  ansible.builtin.file:
    src: "{{ mirror_base_path }}/mirror/deb.debian.org/debian"
    dest: /var/www/html/debian
    state: link
    force: yes
  become: true

- name: Create symbolic link for Debian security mirror
  ansible.builtin.file:
    src: "{{ mirror_base_path }}/mirror/security.debian.org/debian-security"
    dest: /var/www/html/debian-security
    state: link
    force: yes
  become: true

- name: Enable periodic apt-mirror updates via cron
  ansible.builtin.cron:
    name: "Run apt-mirror daily"
    hour: "2"
    minute: "0"
    job: "/usr/bin/apt-mirror > /var/spool/apt-mirror/var/cron.log"
  become: true